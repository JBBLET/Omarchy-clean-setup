# Extra env variables
# env = MY_GLOBAL_ENV,setting
#
# Note on JAVA_HOME / PATH for languages: do NOT set them here.
# Omarchy uses mise (https://mise.jdx.dev) for language runtimes; mise sets
# JAVA_HOME / PATH dynamically per shell based on the active mise config.
# Hard-coding JAVA_HOME globally would override mise and break per-project
# version switching.

# Japanese input method (fcitx5 + Mozc)
# GTK_IM_MODULE is intentionally NOT set: on Wayland, GTK4/GTK3 apps use the
# native Wayland input method protocol automatically. Setting GTK_IM_MODULE=fcitx
# triggers a fcitx5 warning on every login and is redundant on Wayland.
env = QT_IM_MODULE,fcitx
env = XMODIFIERS,@im=fcitx
env = SDL_IM_MODULE,fcitx
env = GLFW_IM_MODULE,ibus
